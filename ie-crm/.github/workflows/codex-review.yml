name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codex-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Trigger Codex Review
        uses: openai/codex-review@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
