<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ops Command Center</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#loading {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #000; display: flex; align-items: center; justify-content: center;
  flex-direction: column; z-index: 1000; transition: opacity 1s;
}
#loading.fade { opacity: 0; pointer-events: none; }
#loading h1 { color: #00ffff; font-family: 'Courier New', monospace; font-size: 1.5em; letter-spacing: 0.3em; }
#loading .bar { width: 300px; height: 2px; background: #111; margin-top: 20px; }
#loading .bar-fill { width: 0%; height: 100%; background: #00ffff; transition: width 0.3s; }
</style>
</head>
<body>
<div id="loading">
  <h1>INITIALIZING COMMAND CENTER</h1>
  <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const barFill = document.getElementById('bar-fill');
const setProgress = p => barFill.style.width = p + '%';

// ─── Renderer ───
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);
setProgress(10);

// ─── Scene ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010208);
scene.fog = new THREE.FogExp2(0x010208, 0.018);

// ─── Camera ───
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(8, 6, 10);
camera.lookAt(0, 1.5, 0);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 2;
controls.maxDistance = 35;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// ─── Postprocessing ───
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.8, 0.6, 0.15
);
composer.addPass(bloomPass);
setProgress(20);

// ─── Helpers ───
const CYAN = 0x00ffff;
const BLUE = 0x0066ff;
const AMBER = 0xff8800;
const DARK_METAL = 0x0a0a10;
const MID_METAL = 0x151520;

function metalMat(color, rough = 0.7) {
  return new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: 0.9 });
}
function glowMat(color, intensity = 2) {
  return new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
}
function emissiveMat(color, intensity = 3) {
  return new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: intensity,
    roughness: 0.3, metalness: 0.5, transparent: true, opacity: 0.85
  });
}

// ─── ROOM ───
// Floor
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorCanvas = document.createElement('canvas');
floorCanvas.width = 512; floorCanvas.height = 512;
const fctx = floorCanvas.getContext('2d');
fctx.fillStyle = '#08080f';
fctx.fillRect(0, 0, 512, 512);
// Grid
fctx.strokeStyle = '#0a1520';
fctx.lineWidth = 1;
for (let i = 0; i <= 512; i += 32) {
  fctx.beginPath(); fctx.moveTo(i, 0); fctx.lineTo(i, 512); fctx.stroke();
  fctx.beginPath(); fctx.moveTo(0, i); fctx.lineTo(512, i); fctx.stroke();
}
// Glow lines at center
fctx.strokeStyle = 'rgba(0, 255, 255, 0.07)';
fctx.lineWidth = 2;
for (let i = 0; i <= 512; i += 64) {
  fctx.beginPath(); fctx.moveTo(i, 0); fctx.lineTo(i, 512); fctx.stroke();
  fctx.beginPath(); fctx.moveTo(0, i); fctx.lineTo(512, i); fctx.stroke();
}
const floorTex = new THREE.CanvasTexture(floorCanvas);
floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
floorTex.repeat.set(4, 4);
const floorMat = new THREE.MeshStandardMaterial({
  map: floorTex, roughness: 0.8, metalness: 0.6, color: 0x0a0a12
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Ceiling — transparent so it never blocks camera
const ceilingMat = new THREE.MeshStandardMaterial({
  color: 0x050510, roughness: 0.9, metalness: 0.9,
  transparent: true, opacity: 0.15, side: THREE.DoubleSide
});
const ceiling = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  ceilingMat
);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = 7;
scene.add(ceiling);

// Walls - octagonal room
const wallCount = 8;
const wallRadius = 12;
const wallHeight = 7;
const wallWidth = wallRadius * 2 * Math.tan(Math.PI / wallCount);
for (let i = 0; i < wallCount; i++) {
  const angle = (i / wallCount) * Math.PI * 2;
  // Main wall panel
  const wallGeo = new THREE.BoxGeometry(wallWidth, wallHeight, 0.3);

  // Procedural wall texture with greebles
  const wCanvas = document.createElement('canvas');
  wCanvas.width = 512; wCanvas.height = 512;
  const wctx = wCanvas.getContext('2d');
  wctx.fillStyle = '#0c0c14';
  wctx.fillRect(0, 0, 512, 512);
  // Panel lines
  wctx.strokeStyle = '#161622';
  wctx.lineWidth = 2;
  for (let r = 0; r < 6; r++) {
    for (let c = 0; c < 4; c++) {
      const px = c * 128 + 8; const py = r * 85 + 8;
      wctx.strokeRect(px, py, 112, 70);
      // Random greeble details
      if (Math.random() > 0.5) {
        wctx.fillStyle = '#0e0e18';
        wctx.fillRect(px + 10, py + 10, 30, 8);
      }
      if (Math.random() > 0.7) {
        wctx.fillStyle = '#12121e';
        wctx.fillRect(px + 60, py + 20, 40, 40);
      }
    }
  }
  // Random small lights
  for (let j = 0; j < 5; j++) {
    wctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,255,255,0.15)' : 'rgba(255,136,0,0.12)';
    wctx.fillRect(Math.random() * 500, Math.random() * 500, 4, 4);
  }
  const wallTex = new THREE.CanvasTexture(wCanvas);
  const wMat = new THREE.MeshStandardMaterial({
    map: wallTex, roughness: 0.85, metalness: 0.7, color: 0x0c0c14,
    side: THREE.DoubleSide, transparent: true, opacity: 0.15
  });

  const wall = new THREE.Mesh(wallGeo, wMat);
  wall.position.set(Math.sin(angle) * wallRadius, wallHeight / 2, Math.cos(angle) * wallRadius);
  wall.rotation.y = angle;
  wall.receiveShadow = true;
  scene.add(wall);

  // Wall trim strips (ambient cyan)
  const trimGeo = new THREE.BoxGeometry(wallWidth * 0.8, 0.02, 0.05);
  const trimMat = emissiveMat(CYAN, 1);
  trimMat.side = THREE.DoubleSide;
  const trim = new THREE.Mesh(trimGeo, trimMat);
  trim.position.set(
    Math.sin(angle) * (wallRadius - 0.2),
    0.1,
    Math.cos(angle) * (wallRadius - 0.2)
  );
  trim.rotation.y = angle;
  scene.add(trim);

  // Upper trim
  const trimU = trim.clone();
  trimU.position.y = wallHeight - 0.3;
  scene.add(trimU);
}
setProgress(35);

// ─── HOLOTABLE ───
const tableGroup = new THREE.Group();
scene.add(tableGroup);

// Base platform - tiered
const baseMat = metalMat(0x0e0e1a, 0.6);
const base1 = new THREE.Mesh(new THREE.CylinderGeometry(3.5, 3.8, 0.3, 32), baseMat);
base1.position.y = 0.15;
base1.receiveShadow = true;
tableGroup.add(base1);

const base2 = new THREE.Mesh(new THREE.CylinderGeometry(2.8, 3.0, 0.2, 32), metalMat(0x101020, 0.5));
base2.position.y = 0.4;
tableGroup.add(base2);

// Table surface ring
const tableRingGeo = new THREE.TorusGeometry(2.2, 0.15, 8, 48);
const tableRing = new THREE.Mesh(tableRingGeo, emissiveMat(CYAN, 1.5));
tableRing.rotation.x = Math.PI / 2;
tableRing.position.y = 0.55;
tableGroup.add(tableRing);

// Inner surface
const tableSurface = new THREE.Mesh(
  new THREE.CylinderGeometry(2.2, 2.2, 0.05, 32),
  new THREE.MeshStandardMaterial({
    color: 0x050515, roughness: 0.3, metalness: 0.8,
    emissive: CYAN, emissiveIntensity: 0.1, transparent: true, opacity: 0.7
  })
);
tableSurface.position.y = 0.52;
tableGroup.add(tableSurface);

// Radial line details on table
for (let i = 0; i < 12; i++) {
  const a = (i / 12) * Math.PI * 2;
  const lineGeo = new THREE.BoxGeometry(0.02, 0.01, 1.8);
  const line = new THREE.Mesh(lineGeo, emissiveMat(CYAN, 0.8));
  line.position.set(Math.sin(a) * 1.1, 0.56, Math.cos(a) * 1.1);
  line.rotation.y = a;
  tableGroup.add(line);
}

// Concentric rings on table surface
for (let r of [0.6, 1.0, 1.5]) {
  const cRing = new THREE.Mesh(
    new THREE.TorusGeometry(r, 0.01, 4, 48),
    emissiveMat(CYAN, 0.6)
  );
  cRing.rotation.x = Math.PI / 2;
  cRing.position.y = 0.56;
  tableGroup.add(cRing);
}

// Holotable edge pylons
for (let i = 0; i < 6; i++) {
  const a = (i / 6) * Math.PI * 2;
  const pylon = new THREE.Mesh(
    new THREE.BoxGeometry(0.15, 0.8, 0.15),
    metalMat(MID_METAL, 0.5)
  );
  pylon.position.set(Math.sin(a) * 2.5, 0.7, Math.cos(a) * 2.5);
  tableGroup.add(pylon);

  // Pylon light
  const pLight = new THREE.Mesh(
    new THREE.BoxGeometry(0.06, 0.3, 0.06),
    emissiveMat(CYAN, 2)
  );
  pLight.position.set(Math.sin(a) * 2.5, 1.0, Math.cos(a) * 2.5);
  tableGroup.add(pLight);
}
setProgress(50);

// ─── CENTRAL HOLOGRAPHIC ORB ───
const orbGroup = new THREE.Group();
orbGroup.position.y = 2.5;
scene.add(orbGroup);

// Core orb
const orbGeo = new THREE.IcosahedronGeometry(0.5, 3);
const orbMat = new THREE.MeshStandardMaterial({
  color: CYAN, emissive: CYAN, emissiveIntensity: 4,
  transparent: true, opacity: 0.6, wireframe: false
});
const orb = new THREE.Mesh(orbGeo, orbMat);
orbGroup.add(orb);

// Wireframe overlay
const orbWire = new THREE.Mesh(
  new THREE.IcosahedronGeometry(0.55, 2),
  new THREE.MeshBasicMaterial({ color: CYAN, wireframe: true, transparent: true, opacity: 0.4 })
);
orbGroup.add(orbWire);

// Inner glow sphere
const innerGlow = new THREE.Mesh(
  new THREE.SphereGeometry(0.35, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 })
);
orbGroup.add(innerGlow);

// Point light from orb
const orbLight = new THREE.PointLight(CYAN, 15, 15, 2);
orbLight.position.copy(orbGroup.position);
scene.add(orbLight);

// Vertical beam from table to orb
const beamGeo = new THREE.CylinderGeometry(0.08, 0.3, 2, 8, 1, true);
const beamMat = new THREE.MeshBasicMaterial({
  color: CYAN, transparent: true, opacity: 0.15, side: THREE.DoubleSide
});
const beam = new THREE.Mesh(beamGeo, beamMat);
beam.position.y = 1.5;
scene.add(beam);

// ─── ORBITING RINGS ───
const rings = [];
const ringConfigs = [
  { radius: 0.9, tube: 0.015, tiltX: 0.3, tiltZ: 0.1, speed: 0.7, color: CYAN },
  { radius: 1.1, tube: 0.012, tiltX: -0.5, tiltZ: 0.4, speed: -0.5, color: BLUE },
  { radius: 1.35, tube: 0.018, tiltX: 0.8, tiltZ: -0.3, speed: 0.3, color: CYAN },
  { radius: 0.7, tube: 0.01, tiltX: -0.2, tiltZ: 0.7, speed: -0.9, color: 0x00aaff },
  { radius: 1.6, tube: 0.008, tiltX: 0.1, tiltZ: -0.6, speed: 0.2, color: BLUE },
];
ringConfigs.forEach(cfg => {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(cfg.radius, cfg.tube, 8, 64),
    emissiveMat(cfg.color, 3)
  );
  ring.rotation.x = cfg.tiltX;
  ring.rotation.z = cfg.tiltZ;
  ring.position.y = 2.5;
  ring.userData = { speed: cfg.speed, baseRotX: cfg.tiltX, baseRotZ: cfg.tiltZ };
  scene.add(ring);
  rings.push(ring);
});

// Small orbiting data nodes on rings
for (let i = 0; i < 8; i++) {
  const a = Math.random() * Math.PI * 2;
  const r = 0.7 + Math.random() * 0.9;
  const node = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.04, 0),
    emissiveMat(CYAN, 4)
  );
  node.position.set(Math.cos(a) * r, 2.5 + (Math.random() - 0.5) * 0.5, Math.sin(a) * r);
  node.userData = { angle: a, radius: r, speed: 0.3 + Math.random() * 0.5, yOff: node.position.y };
  scene.add(node);
  rings.push(node); // reuse array for animation
}
setProgress(60);

// ─── AGENT FIGURES ───
const agents = [];
const agentCount = 6;
for (let i = 0; i < agentCount; i++) {
  const angle = (i / agentCount) * Math.PI * 2 + Math.PI / 6;
  const dist = 3.2 + (i % 2) * 0.4;
  const agentGroup = new THREE.Group();
  agentGroup.position.set(Math.sin(angle) * dist, 0.5, Math.cos(angle) * dist);
  agentGroup.rotation.y = angle + Math.PI; // face center

  // Body (torso)
  const torso = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.22, 0.7, 8),
    new THREE.MeshStandardMaterial({
      color: 0x0a0a18, roughness: 0.6, metalness: 0.8,
      emissive: CYAN, emissiveIntensity: 0.08
    })
  );
  torso.position.y = 0.8;
  agentGroup.add(torso);

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 8, 8),
    new THREE.MeshStandardMaterial({
      color: 0x0e0e20, roughness: 0.5, metalness: 0.7,
      emissive: CYAN, emissiveIntensity: 0.1
    })
  );
  head.position.y = 1.3;
  agentGroup.add(head);

  // Visor/eyes - glowing
  const visor = new THREE.Mesh(
    new THREE.BoxGeometry(0.15, 0.03, 0.05),
    emissiveMat(CYAN, 5)
  );
  visor.position.set(0, 1.32, 0.1);
  agentGroup.add(visor);

  // Legs
  for (let side of [-1, 1]) {
    const leg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.07, 0.5, 6),
      metalMat(0x080816, 0.7)
    );
    leg.position.set(side * 0.1, 0.25, 0);
    agentGroup.add(leg);
  }

  // Arms
  for (let side of [-1, 1]) {
    const arm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.05, 0.5, 6),
      metalMat(0x0a0a18, 0.7)
    );
    arm.position.set(side * 0.28, 0.75, 0.05);
    arm.rotation.z = side * 0.2;
    arm.rotation.x = -0.3;
    agentGroup.add(arm);
  }

  // Small station console in front of each agent
  const console_ = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.4, 0.2),
    metalMat(MID_METAL, 0.5)
  );
  console_.position.set(0, 0.55, 0.5);
  agentGroup.add(console_);

  // Console screen
  const screenMat = emissiveMat(CYAN, 1.5);
  const screen_ = new THREE.Mesh(
    new THREE.PlaneGeometry(0.4, 0.2),
    screenMat
  );
  screen_.position.set(0, 0.7, 0.39);
  agentGroup.add(screen_);

  scene.add(agentGroup);
  agents.push({
    group: agentGroup,
    baseY: 0.5,
    phase: Math.random() * Math.PI * 2,
    speed: 0.8 + Math.random() * 0.4
  });
}
setProgress(70);

// ─── HOLOGRAPHIC WALL DISPLAYS ───
const displays = [];
const displayAngles = [0.4, 1.5, 2.8, 4.2, 5.5];
displayAngles.forEach((angle, idx) => {
  const displayGroup = new THREE.Group();
  const dist = 10;
  displayGroup.position.set(Math.sin(angle) * dist, 3.5, Math.cos(angle) * dist);
  displayGroup.rotation.y = angle;

  // Frame — semi-transparent so it doesn't block camera
  const frameMat = new THREE.MeshStandardMaterial({
    color: MID_METAL, roughness: 0.5, metalness: 0.9,
    transparent: true, opacity: 0.3, side: THREE.DoubleSide
  });
  const frame = new THREE.Mesh(
    new THREE.BoxGeometry(3, 2, 0.05),
    frameMat
  );
  displayGroup.add(frame);

  // Screen with canvas texture
  const dCanvas = document.createElement('canvas');
  dCanvas.width = 512; dCanvas.height = 256;
  const dctx = dCanvas.getContext('2d');
  const dTex = new THREE.CanvasTexture(dCanvas);

  const screenMat = new THREE.MeshStandardMaterial({
    map: dTex, emissive: idx % 2 === 0 ? CYAN : BLUE,
    emissiveIntensity: 1.5, emissiveMap: dTex,
    transparent: true, opacity: 0.9
  });
  const screen_ = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 1.8), screenMat);
  screen_.position.z = 0.03;
  displayGroup.add(screen_);

  // Border glow
  const border = new THREE.Mesh(
    new THREE.BoxGeometry(3.1, 2.1, 0.02),
    emissiveMat(CYAN, 1.5)
  );
  border.position.z = -0.02;
  displayGroup.add(border);

  scene.add(displayGroup);
  displays.push({ group: displayGroup, canvas: dCanvas, ctx: dctx, tex: dTex, scroll: 0, type: idx });
});

// Display content generation
function updateDisplay(d, time) {
  const ctx = d.ctx;
  const w = 512, h = 256;
  ctx.fillStyle = 'rgba(0, 5, 15, 0.92)';
  ctx.fillRect(0, 0, w, h);

  d.scroll += 0.5;
  const color = d.type % 2 === 0 ? '#00ffff' : '#0088ff';
  const dimColor = d.type % 2 === 0 ? 'rgba(0,255,255,0.3)' : 'rgba(0,100,255,0.3)';

  ctx.font = '10px Courier New';
  ctx.fillStyle = dimColor;

  // Scrolling data lines
  const dataLines = [
    'AGENT-01 STATUS: ACTIVE    CPU: 87%  MEM: 4.2GB',
    'AGENT-02 STATUS: ACTIVE    CPU: 62%  MEM: 3.8GB',
    'AGENT-03 STATUS: STANDBY   CPU: 12%  MEM: 1.1GB',
    'AGENT-04 STATUS: ACTIVE    CPU: 91%  MEM: 5.6GB',
    'AGENT-05 STATUS: ACTIVE    CPU: 73%  MEM: 4.0GB',
    'AGENT-06 STATUS: SCANNING  CPU: 45%  MEM: 2.3GB',
    '─────────────────────────────────────────────────',
    'NETWORK: SECURE    UPLINK: 12.4 Gbps    LAT: 2ms',
    'THREATS DETECTED: 0     ANOMALIES: 3 (LOW)',
    'MARKET SCAN: 847 PROPERTIES  |  42 NEW TODAY',
    'CRM SYNC: OK  |  CONTACTS: 9,247  |  +12 TODAY',
    'TPE SCORES RECALCULATED: 2,841 ENTITIES',
    'ENRICHMENT QUEUE: 156 PENDING  |  ETA: 14 MIN',
    '─────────────────────────────────────────────────',
    'LEANNE ASSOC. COMMAND CENTER v3.7.1',
    'HOUSTON AI: ONLINE    MODE: AUTONOMOUS',
    'MEMORY: 48GB ALLOCATED | 31GB ACTIVE',
    'NEXT BRIEFING: 06:00 PST',
  ];

  const offset = Math.floor(d.scroll / 14) % dataLines.length;
  for (let i = 0; i < 16; i++) {
    const lineIdx = (i + offset) % dataLines.length;
    const y = 18 + i * 15 - (d.scroll % 14);
    ctx.fillStyle = i < 2 ? color : dimColor;
    ctx.fillText(dataLines[lineIdx], 15, y);
  }

  // Header bar
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, w, 2);
  ctx.fillRect(0, h - 2, w, 2);

  // Blinking cursor
  if (Math.sin(time * 4) > 0) {
    ctx.fillStyle = color;
    ctx.fillRect(15, 240, 8, 10);
  }

  // Bar chart on right side
  for (let i = 0; i < 6; i++) {
    const bh = 20 + Math.sin(time * 2 + i) * 15 + Math.random() * 5;
    ctx.fillStyle = dimColor;
    ctx.fillRect(380 + i * 20, h - 30 - bh, 14, bh);
  }

  // Scan line
  const scanY = (time * 40 + d.type * 60) % h;
  ctx.fillStyle = 'rgba(0,255,255,0.08)';
  ctx.fillRect(0, scanY, w, 3);

  d.tex.needsUpdate = true;
}
setProgress(80);

// ─── PARTICLE SYSTEM ───
const particleCount = 600;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
const particleVelocities = [];

for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 20;
  particlePositions[i * 3 + 1] = Math.random() * 7;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 20;
  particleSizes[i] = Math.random() * 3 + 0.5;
  particleVelocities.push({
    x: (Math.random() - 0.5) * 0.003,
    y: (Math.random() - 0.5) * 0.002,
    z: (Math.random() - 0.5) * 0.003
  });
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
  color: CYAN, size: 0.03, transparent: true, opacity: 0.4,
  blending: THREE.AdditiveBlending, depthWrite: false
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─── LIGHTING ───
// Ambient - very low
const ambient = new THREE.AmbientLight(0x040410, 0.5);
scene.add(ambient);

// Ceiling spots (amber accent)
const spotPositions = [
  [4, 6.8, 4], [-4, 6.8, -4], [4, 6.8, -4], [-4, 6.8, 4]
];
spotPositions.forEach(pos => {
  const spot = new THREE.PointLight(AMBER, 2, 12, 2);
  spot.position.set(...pos);
  scene.add(spot);

  // Visible fixture
  const fixture = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1, 0.2, 0.1, 6),
    emissiveMat(AMBER, 1)
  );
  fixture.position.set(...pos);
  scene.add(fixture);
});

// Central overhead light
const centerLight = new THREE.SpotLight(CYAN, 8, 15, Math.PI / 6, 0.5, 2);
centerLight.position.set(0, 6.9, 0);
centerLight.target.position.set(0, 0, 0);
scene.add(centerLight);
scene.add(centerLight.target);

// Floor accent lights at base
for (let i = 0; i < 8; i++) {
  const a = (i / 8) * Math.PI * 2;
  const fLight = new THREE.PointLight(CYAN, 0.5, 4, 2);
  fLight.position.set(Math.sin(a) * 3.5, 0.1, Math.cos(a) * 3.5);
  scene.add(fLight);
}
setProgress(90);

// ─── Pillars removed ───

// ─── Central overhead projector ───
const projectorMat = new THREE.MeshStandardMaterial({
  color: MID_METAL, roughness: 0.4, metalness: 0.9,
  transparent: true, opacity: 0.3, side: THREE.DoubleSide
});
const projector = new THREE.Mesh(
  new THREE.CylinderGeometry(0.5, 0.8, 0.3, 8),
  projectorMat
);
projector.position.set(0, 6.85, 0);
scene.add(projector);

const projRing = new THREE.Mesh(
  new THREE.TorusGeometry(0.6, 0.03, 4, 16),
  emissiveMat(CYAN, 2)
);
projRing.rotation.x = Math.PI / 2;
projRing.position.set(0, 6.7, 0);
scene.add(projRing);

setProgress(100);

// Hide loading screen
setTimeout(() => {
  document.getElementById('loading').classList.add('fade');
  setTimeout(() => document.getElementById('loading').style.display = 'none', 1000);
}, 500);

// ─── ANIMATION LOOP ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Orb pulse
  const pulse = 1 + Math.sin(t * 2) * 0.15;
  orb.scale.setScalar(pulse);
  orbWire.rotation.y = t * 0.3;
  orbWire.rotation.x = t * 0.2;
  innerGlow.scale.setScalar(0.8 + Math.sin(t * 3) * 0.2);
  orbMat.emissiveIntensity = 3 + Math.sin(t * 2.5) * 1.5;
  orbLight.intensity = 12 + Math.sin(t * 2) * 5;

  // Beam flicker
  beamMat.opacity = 0.1 + Math.sin(t * 4) * 0.05 + Math.random() * 0.02;

  // Rings
  rings.forEach((ring, i) => {
    if (ring.userData.speed !== undefined && ring.geometry.type === 'TorusGeometry') {
      ring.rotation.y += ring.userData.speed * 0.01;
    } else if (ring.userData.angle !== undefined) {
      // Orbiting data nodes
      ring.userData.angle += ring.userData.speed * 0.01;
      ring.position.x = Math.cos(ring.userData.angle) * ring.userData.radius;
      ring.position.z = Math.sin(ring.userData.angle) * ring.userData.radius;
      ring.position.y = ring.userData.yOff + Math.sin(t * 2 + i) * 0.1;
    }
  });

  // Agent breathing
  agents.forEach(agent => {
    const breathe = Math.sin(t * agent.speed + agent.phase) * 0.02;
    agent.group.position.y = agent.baseY + breathe;
    // Subtle sway
    agent.group.rotation.y += Math.sin(t * 0.5 + agent.phase) * 0.0002;
  });

  // Wall displays
  displays.forEach(d => updateDisplay(d, t));

  // Particles
  const pos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i * 3] += particleVelocities[i].x;
    pos[i * 3 + 1] += particleVelocities[i].y;
    pos[i * 3 + 2] += particleVelocities[i].z;

    // Wrap around
    if (Math.abs(pos[i * 3]) > 10) pos[i * 3] *= -0.9;
    if (pos[i * 3 + 1] > 7) pos[i * 3 + 1] = 0.1;
    if (pos[i * 3 + 1] < 0) pos[i * 3 + 1] = 6.9;
    if (Math.abs(pos[i * 3 + 2]) > 10) pos[i * 3 + 2] *= -0.9;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Bloom pulse
  bloomPass.strength = 1.6 + Math.sin(t * 0.5) * 0.2;

  controls.update();
  composer.render();
}

animate();

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});
</script>
